name: Release

# CD: on a version tag (e.g. v1.0.0), build the CPU image and publish it to the
# GitHub Container Registry. This is the deliverable for a library — there is no
# service to deploy; the artifact is the container image.
on:
  push:
    tags: [ 'v*' ]

jobs:
  publish-image:
    name: Build & push CPU image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: write # checkout + create the GitHub Release
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Lowercase image name (GHCR requires lowercase)
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest

      # A tag without a Release page reads as "0 releases" on GitHub. Create it
      # here, after the image push, so the release always has its artifact.
      # Idempotent: skipped if the release already exists (e.g. v0.2.0, made by hand).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
